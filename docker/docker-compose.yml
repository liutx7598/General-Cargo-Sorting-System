version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: stowage-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../backend/src/main/resources/db/migration/V1__init_schema_and_data.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: stowage-redis
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  algorithm-service:
    build:
      context: ../algorithm-service
    container_name: stowage-algorithm
    environment:
      STOWAGE_LOG_LEVEL: INFO
    ports:
      - "${ALGORITHM_PORT}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
    container_name: stowage-backend
    env_file:
      - ../.env
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_REDIS_HOST: ${SPRING_REDIS_HOST}
      SPRING_REDIS_PORT: ${SPRING_REDIS_PORT}
      APP_ALGORITHM_BASE_URL: ${ALGORITHM_BASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      algorithm-service:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:8080"

  frontend:
    build:
      context: ../frontend
    container_name: stowage-frontend
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:1.27
    container_name: stowage-nginx
    depends_on:
      - frontend
      - backend
      - algorithm-service
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
